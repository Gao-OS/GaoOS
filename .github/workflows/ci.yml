name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: Format check
        run: zig fmt --check kernel/src/ kernel/arch/ libos/ user/ platform/
      - name: Unit tests
        run: zig build test
      - name: Cross-compile kernel
        run: zig build

  qemu-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-arm
      - name: Build and run QEMU integration test
        run: zig build qemu-test
