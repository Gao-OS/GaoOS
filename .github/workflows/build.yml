name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig build
      - uses: actions/upload-artifact@v4
        with:
          name: kernel8.img
          path: zig-out/bin/kernel8.img
